<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora-tomate</title>
</head>
<body>
    <div id="container">
        <header>
            <h1 class="titulo-big">🍅Calculadora-tomate</h1>
        </header>
        <main>
            <h2 class="section-big">Sobre</h2>
            <p>Bem-vindo a minha calculadora! Escolha entre as diversas opções de funções e digite os números necessarios.</p>
            <h2 class="section-big">Calculadora</h2>
            <form action="" id="calculadora">
                <label for="function">Selecione a função: </label>
                <select name="function" id="function">
                    <option value="dobro">Dobro</option>
                    <option value="triplo">Triplo</option>
                    <option value="quadruplo">Quadruplo</option>
                    <option value="quintuplo">Quintuplo</option>
                    <option value="sextuplo">Sêxtuplo</option>
                    <option value="potDois">Quadrado</option>
                    <option value="potTres">Cubo</option>
                    <option value="potQuatro">Elevado a quatro</option>
                    <option value="potCinco">Elevado a cinco</option>
                    <option value="potSeis">Elevado a seis</option>
                    <option value="mediaQuatro">Media de 4 números</option>
                    <option value="baskhara">Bhaskara</option>
                </select>
                <div id="digitos">
                    <span class="small-grey">Digite os digitos da operação:</span><br>
                    <input type="number" id="num1">
                    <input type="number" id="num2">
                    <input type="number" id="num3">
                    <input type="number" id="num4">
                </div>
            </form>
            <button id="enviar" onclick="calcular()">Calcular</button>
            <div id="resultados">
                <span class="small-grey">Resultados:</span><br>
                <textarea id="resultado-box" rows="6" readonly="true"></textarea>
            </div>
        </main>
        <footer>
            <span>Site por Samuel M. 2026 | Dedicado aos meus gatos.</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
